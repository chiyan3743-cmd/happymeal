<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울 지역 내 초등학교 급식 메뉴 조회</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, '맑은 고딕', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      color: #2d3748;
    }

    header {
      background: linear-gradient(135deg, #2b6cb0 0%, #3182ce 100%);
      color: white;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(49,130,206,0.3);
    }

    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { margin-top: 6px; font-size: 0.92rem; opacity: 0.85; }

    .container { max-width: 900px; margin: 0 auto; padding: 28px 16px 60px; }

    /* --- 검색 --- */
    .search-box {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .search-row { display: flex; gap: 10px; }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #3182ce; }

    .btn {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #3182ce; color: white; }
    .btn-primary:hover { background: #2b6cb0; }

    /* --- 학교 목록 --- */
    .school-list {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .school-list-title {
      padding: 14px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #718096;
      background: #f7fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    .school-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f4f8;
      cursor: pointer;
      transition: background 0.15s;
    }
    .school-item:last-child { border-bottom: none; }
    .school-item:hover  { background: #ebf8ff; }
    .school-item.active { background: #bee3f8; }

    .school-name { font-size: 1rem; font-weight: 600; }
    .school-addr { font-size: 0.82rem; color: #718096; margin-top: 2px; }

    .school-badge {
      font-size: 0.75rem;
      background: #3182ce;
      color: white;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      margin-left: 12px;
    }

    /* --- 급식 영역 --- */
    .meal-section {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .meal-header {
      padding: 18px 20px;
      background: linear-gradient(135deg, #2b6cb0 0%, #3182ce 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .meal-header h2 { font-size: 1.05rem; font-weight: 700; }
    .meal-header .school-tag { font-size: 0.82rem; opacity: 0.85; }

    .date-controls { display: flex; align-items: center; gap: 8px; }

    .date-input {
      padding: 8px 12px;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    .date-input::-webkit-calendar-picker-indicator { filter: invert(1); }

    .btn-nav {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.3);
      font-size: 0.9rem;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.35); }

    /* --- 주간 탭 --- */
    .week-tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid #e2e8f0;
    }

    .week-tab {
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      font-size: 0.82rem;
      color: #718096;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
    }
    .week-tab:hover { background: #f7fafc; color: #2b6cb0; }
    .week-tab.active {
      color: #2b6cb0;
      font-weight: 700;
      border-bottom-color: #2b6cb0;
      background: #ebf8ff;
    }
    .week-tab .day-name { font-size: 0.78rem; font-weight: 600; }
    .week-tab .day-date { font-size: 0.7rem; margin-top: 2px; color: #a0aec0; }
    .week-tab.active .day-date { color: #3182ce; }
    .week-tab.today .day-name { color: #e53e3e; }

    /* --- 급식 콘텐츠 --- */
    .meal-content {
      padding: 24px 20px;
      min-height: 220px;
    }

    .meal-type-label {
      font-size: 1rem;
      font-weight: 800;
      color: #2b6cb0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ★ 메뉴 카드 그리드 */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .menu-card {
      background: white;
      border-radius: 16px;
      padding: 14px 8px 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border: 2px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }
    .menu-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .menu-card .food-emoji {
      font-size: 2.4rem;
      line-height: 1;
      margin-bottom: 8px;
      display: block;
    }

    .menu-card .food-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #2d3748;
      line-height: 1.3;
      word-break: keep-all;
    }

    /* 파스텔 색상 팔레트 (카드 배경) */
    .menu-card.c0 { background: #fff5f5; border-color: #fed7d7; }
    .menu-card.c1 { background: #fffaf0; border-color: #feebc8; }
    .menu-card.c2 { background: #f0fff4; border-color: #c6f6d5; }
    .menu-card.c3 { background: #ebf8ff; border-color: #bee3f8; }
    .menu-card.c4 { background: #f5f0ff; border-color: #e9d8fd; }
    .menu-card.c5 { background: #fff0f6; border-color: #ffd6e7; }
    .menu-card.c6 { background: #fffff0; border-color: #fefcbf; }
    .menu-card.c7 { background: #f0f9ff; border-color: #bae6fd; }

    /* 영양 정보 */
    .kcal-bar {
      background: #f7fafc;
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 4px;
    }

    .kcal-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #718096;
      margin-bottom: 8px;
    }

    .kcal-main {
      font-size: 1.3rem;
      font-weight: 800;
      color: #e53e3e;
      margin-bottom: 10px;
    }

    .ntr-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ntr-chip {
      background: white;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: #4a5568;
      border: 1px solid #e2e8f0;
    }
    .ntr-chip strong { color: #2b6cb0; }

    .no-meal {
      text-align: center;
      padding: 50px 20px;
      color: #a0aec0;
      font-size: 0.95rem;
    }
    .no-meal .big-emoji { font-size: 3rem; margin-bottom: 12px; }

    /* 로딩 */
    .status-box { text-align: center; padding: 40px 20px; color: #a0aec0; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #3182ce;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    .api-notice {
      background: #fffbeb;
      border: 1px solid #f6e05e;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem;
      color: #744210;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .api-notice a { color: #2b6cb0; }

    /* --- 급식실 일러스트 --- */
    .cafeteria-illust {
      margin-bottom: 24px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(49,130,206,0.12);
      background: white;
    }

    .cafeteria-illust img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hidden { display: none; }

    @media (max-width: 540px) {
      header h1 { font-size: 1.4rem; }
      .meal-header { flex-direction: column; }
      .week-tab .day-name { font-size: 0.72rem; }
      .week-tab .day-date { font-size: 0.62rem; }
      .menu-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
      .menu-card .food-emoji { font-size: 2rem; }
    }

    /* --- 반찬 카드 투표 패널 --- */
    .menu-card { cursor: pointer; }
    .menu-card.selected { border-color: #3182ce !important; box-shadow: 0 0 0 3px rgba(49,130,206,0.2); }

    .vote-panel {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
      border: 2px solid #bee3f8;
    }
    .vote-panel.hidden { display: none; }
    .vote-panel-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 14px;
    }
    .vote-panel-btns {
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .vote-emoji-btn {
      border: 2px solid #e2e8f0;
      background: #f7fafc;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 2rem;
      cursor: pointer;

      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      min-width: 80px;
    }
    .vote-emoji-btn span { font-size: 0.75rem; color: #4a5568; font-weight: 600; }
    .vote-emoji-btn:hover { border-color: #3182ce; background: #ebf8ff; transform: scale(1.05); }
    .vote-emoji-btn.voted { border-color: #3182ce; background: #ebf8ff; }
    .vote-emoji-btn .vote-count { font-size: 0.8rem; color: #718096; }
  </style>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
  <h1>🍱 서울 지역 내 초등학교 급식 메뉴 조회</h1>
  <p>NEIS 교육정보 공개서비스를 활용한 급식 조회</p>
</header>

<div class="container">

  <!-- 검색 -->
  <div class="search-box">
    <div class="search-row">
      <input class="search-input" id="schoolNameInput" type="text"
        placeholder="서울 지역 내의 학교 이름을 입력하세요."
        onkeydown="if(event.key==='Enter') searchSchool()" />
      <button class="btn btn-primary" onclick="searchSchool()">검색</button>
    </div>
    <div class="search-row" style="margin-top:10px; align-items:center;">
      <input class="search-input" id="apiKeyInput" type="text"
        placeholder="🔑 NEIS API 키 (선택사항 — 없어도 조회 가능)"
        style="font-size:0.85rem;"
        oninput="saveApiKey(this.value)" />
      <span id="apiKeyStatus" style="font-size:0.82rem;color:#38a169;white-space:nowrap;padding:0 8px;"></span>
    </div>
  </div>

  <!-- 학교 목록 -->
  <div id="schoolListWrap" class="hidden">
    <div class="school-list" id="schoolList"></div>
  </div>

  <!-- 급식실 일러스트 -->
  <div class="cafeteria-illust" id="illustWrap">
    <img src="illust.jpg" alt="급식실에서 즐겁게 밥 먹는 아이들" />
  </div>

  <!-- 급식 정보 -->
  <div id="mealSection" class="meal-section hidden">
    <div class="meal-header">
      <div>
        <h2 id="mealSchoolName">학교명</h2>
        <div class="school-tag" id="mealSchoolAddr"></div>
      </div>
      <div class="date-controls">
        <button class="btn btn-nav" onclick="changeWeek(-1)">◀ 이전 주</button>
        <input type="date" class="date-input" id="dateInput" onchange="onDateChange()" />
        <button class="btn btn-nav" onclick="changeWeek(1)">다음 주 ▶</button>
      </div>
    </div>
    <div class="week-tabs" id="weekTabs"></div>
    <div class="meal-content" id="mealContent"></div>
  </div>

</div>

<script>
// ── Firebase 초기화 ───────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBsYVr5Gq9fz11P7LA1qAT-h3ckuQv6CMo",
  authDomain: "happymeal-2bbbf.firebaseapp.com",
  projectId: "happymeal-2bbbf",
  storageBucket: "happymeal-2bbbf.firebasestorage.app",
  messagingSenderId: "116410662244",
  appId: "1:116410662244:web:de24c47c891aa943428e71"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let activeVk = null;
let activePanelId = null;

async function loadVotes(voteKey) {
  const doc = await db.collection('votes').doc(voteKey).get();
  return doc.exists ? doc.data() : { good: 0, meh: 0, bad: 0 };
}

function selectCard(el, vk, panelId, name) {
  const panel = document.getElementById('panel-' + panelId);
  if (!panel) return;

  // 같은 카드 재클릭 → 패널 닫기
  if (activeVk === vk && !panel.classList.contains('hidden')) {
    panel.classList.add('hidden');
    el.classList.remove('selected');
    activeVk = null; activePanelId = null;
    return;
  }

  // 이전 카드 선택 해제
  if (activePanelId) {
    const prev = document.getElementById('panel-' + activePanelId);
    if (prev) prev.classList.add('hidden');
  }
  document.querySelectorAll('.menu-card.selected').forEach(c => c.classList.remove('selected'));

  activeVk = vk;
  activePanelId = panelId;
  el.classList.add('selected');

  // 이름 표시
  document.getElementById('panel-label-' + panelId).textContent = '🍽️ ' + name + ' 어땠나요?';

  // 이전 투표 상태 반영
  const prevVoted = localStorage.getItem('vote_' + vk);
  ['good','meh','bad'].forEach(r => {
    const btn = document.getElementById('vbtn-' + r + '-' + panelId);
    if (btn) { btn.classList.toggle('voted', r === prevVoted); }
  });

  panel.classList.remove('hidden');

  // 투표 수 로드
  loadVotes(vk).then(votes => {
    ['good','meh','bad'].forEach(r => {
      const el = document.getElementById('vcnt-' + r + '-' + panelId);
      if (el) el.textContent = votes[r] || 0;
    });
  });
}

async function castVote(reaction) {
  if (!activeVk || !activePanelId) return;
  const vk = activeVk;
  const panelId = activePanelId;
  const prevVoted = localStorage.getItem('vote_' + vk);

  ['good','meh','bad'].forEach(r => {
    const btn = document.getElementById('vbtn-' + r + '-' + panelId);
    if (btn) btn.disabled = true;
  });

  if (prevVoted === reaction) {
    // 재클릭 → 취소
    await db.collection('votes').doc(vk).set(
      { [reaction]: firebase.firestore.FieldValue.increment(-1) }, { merge: true }
    );
    localStorage.removeItem('vote_' + vk);
  } else {
    // 이전 투표 취소 후 새 투표
    if (prevVoted) {
      await db.collection('votes').doc(vk).set(
        { [prevVoted]: firebase.firestore.FieldValue.increment(-1) }, { merge: true }
      );
    }
    await db.collection('votes').doc(vk).set(
      { [reaction]: firebase.firestore.FieldValue.increment(1) }, { merge: true }
    );
    localStorage.setItem('vote_' + vk, reaction);
  }

  const votes = await loadVotes(vk);
  ['good','meh','bad'].forEach(r => {
    const btn = document.getElementById('vbtn-' + r + '-' + panelId);
    const cnt = document.getElementById('vcnt-' + r + '-' + panelId);
    if (btn) { btn.disabled = false; btn.classList.toggle('voted', r === localStorage.getItem('vote_' + vk)); }
    if (cnt) cnt.textContent = votes[r] || 0;
  });
}

// ── 상태 ─────────────────────────────────────────────────
let selectedSchool = null;
let currentDate    = toDateStr(new Date());
let weekMealData   = {};
let apiKey         = localStorage.getItem('neisApiKey') || '';

document.getElementById('apiKeyInput').value = apiKey;
if (apiKey) document.getElementById('apiKeyStatus').textContent = '✓ 저장됨';

function saveApiKey(v) {
  apiKey = v.trim();
  localStorage.setItem('neisApiKey', apiKey);
  document.getElementById('apiKeyStatus').textContent = apiKey ? '✓ 저장됨' : '';
}

  // 국/탕/찌개/스프

  { keys: ['김치찌개', '김치국'], emoji: '🌶️' },

  { keys: ['삼겹살', '베이컨', '햄', '소시지', '핫도그'], emoji: '🥓' },
  { keys: ['갈비', '등갈비', '돼지갈비', '소갈비'], emoji: '🍖' },
  { keys: ['불고기', '제육볶음', '돼지볶음', '우육', '소불고기'], emoji: '🥩' },
  { keys: ['카레', '커리'], emoji: '🍛' },
  { keys: ['만두', '교자', '군만두', '찐만두'], emoji: '🥟' },
  { keys: ['피자'], emoji: '🍕' },
  { keys: ['햄버거', '버거'], emoji: '🍔' },
  { keys: ['닭', '오리'], emoji: '🍗' },

function getFoodEmoji(name) {
  const n = name.replace(/\s/g, '');
  for (const { keys, emoji } of FOOD_EMOJI_MAP) {
    if (keys.some(k => n.includes(k))) return emoji;
  }
  return '🍽️';   // 기본값
}

// 카드 색상 (순환)
const CARD_COLORS = ['c0','c1','c2','c3','c4','c5','c6','c7'];

// ── 날짜 유틸 ─────────────────────────────────────────────
function toDateStr(d) { return d.toISOString().slice(0, 10); }
function formatYMD(s) { return s.replace(/-/g, ''); }

function getMondayOf(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return toDateStr(d);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return toDateStr(d);
}

function formatDisplay(dateStr) {
  const d = new Date(dateStr);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

const DAY_NAMES = ['일','월','화','수','목','금','토'];

// ── NEIS API ──────────────────────────────────────────────
async function neisGet(endpoint, params) {
  const p = new URLSearchParams({ Type: 'json', pSize: 100, ...params });
  if (apiKey) p.set('KEY', apiKey);
  const res = await fetch(`https://open.neis.go.kr/hub/${endpoint}?${p}`);
  if (!res.ok) throw new Error('네트워크 오류');
  return res.json();
}

// ── 학교 검색 ─────────────────────────────────────────────
async function searchSchool() {
  const name = document.getElementById('schoolNameInput').value.trim();
  if (!name) { alert('학교 이름을 입력해주세요.'); return; }

  document.getElementById('illustWrap').classList.add('hidden');
  const wrap = document.getElementById('schoolListWrap');
  const list = document.getElementById('schoolList');
  wrap.classList.remove('hidden');
  list.innerHTML = `<div class="school-list-title">검색 중...</div>
    <div class="status-box"><div class="spinner"></div></div>`;

  try {
    const data = await neisGet('schoolInfo', {
      LCTN_SC_NM: '서울특별시', SCHUL_KND_SC_NM: '초등학교', SCHUL_NM: name, pSize: 30,
    });
    const rows = data?.schoolInfo?.[1]?.row;
    if (!rows?.length) {
      list.innerHTML = `<div class="school-list-title">검색 결과</div>
        <div class="status-box">😕 검색 결과가 없습니다.<br><small style="margin-top:6px;display:block;">다른 키워드로 검색해보세요.</small></div>`;
      return;
    }
    list.innerHTML = `<div class="school-list-title">검색 결과 ${rows.length}개</div>`;
    rows.forEach(s => {
      const item = document.createElement('div');
      item.className = 'school-item';
      item.innerHTML = `
        <div>
          <div class="school-name">${s.SCHUL_NM}</div>
          <div class="school-addr">${s.ORG_RDNMA || ''}</div>
        </div>
        <span class="school-badge">${s.SCHUL_KND_SC_NM}</span>`;
      item.onclick = () => selectSchool(s, item);
      list.appendChild(item);
    });
  } catch (e) {
    list.innerHTML = `<div class="school-list-title">오류</div>
      <div class="status-box">❌ 데이터를 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
  }
}

// ── 학교 선택 ─────────────────────────────────────────────
function selectSchool(school, el) {
  document.querySelectorAll('.school-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  selectedSchool = school;
  currentDate = toDateStr(new Date());
  document.getElementById('dateInput').value = currentDate;
  document.getElementById('mealSchoolName').textContent = school.SCHUL_NM;
  document.getElementById('mealSchoolAddr').textContent = school.ORG_RDNMA || '';
  document.getElementById('mealSection').classList.remove('hidden');
  loadWeekMeals();
  document.getElementById('mealSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 날짜 변경 ─────────────────────────────────────────────
function onDateChange() { currentDate = document.getElementById('dateInput').value; loadWeekMeals(); }
function changeWeek(dir) {
  currentDate = addDays(currentDate, dir * 7);
  document.getElementById('dateInput').value = currentDate;
  loadWeekMeals();
}

// ── 주간 급식 불러오기 ────────────────────────────────────
async function loadWeekMeals() {
  const monday = getMondayOf(currentDate);
  const from = formatYMD(monday);
  const to   = formatYMD(addDays(monday, 4));

  renderWeekTabs(monday, null);
  document.getElementById('mealContent').innerHTML =
    `<div class="status-box"><div class="spinner"></div>급식 정보를 불러오는 중...</div>`;

  try {
    const data = await neisGet('mealServiceDietInfo', {
      ATPT_OFCDC_SC_CODE: selectedSchool.ATPT_OFCDC_SC_CODE,
      SD_SCHUL_CODE: selectedSchool.SD_SCHUL_CODE,
      MLSV_FROM_YMD: from, MLSV_TO_YMD: to,
    });
    weekMealData = {};
    (data?.mealServiceDietInfo?.[1]?.row || []).forEach(r => {
      if (!weekMealData[r.MLSV_YMD]) weekMealData[r.MLSV_YMD] = [];
      weekMealData[r.MLSV_YMD].push(r);
    });
    renderWeekTabs(monday, currentDate);
    renderMeal(formatYMD(currentDate));
  } catch (e) {
    document.getElementById('mealContent').innerHTML =
      `<div class="status-box">❌ 급식 정보를 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
  }
}

// ── 주간 탭 ───────────────────────────────────────────────
function renderWeekTabs(monday, activeDate) {
  const today = formatYMD(toDateStr(new Date()));
  const tabs = document.getElementById('weekTabs');
  tabs.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d   = addDays(monday, i);
    const ymd = formatYMD(d);
    const tab = document.createElement('div');
    tab.className = 'week-tab'
      + (ymd === formatYMD(activeDate || '') ? ' active' : '')
      + (ymd === today ? ' today' : '');
    tab.innerHTML = `<div class="day-name">${DAY_NAMES[new Date(d).getDay()]}요일</div>
      <div class="day-date">${formatDisplay(d)}</div>`;
    tab.onclick = () => {
      currentDate = d;
      document.getElementById('dateInput').value = d;
      document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderMeal(ymd);
    };
    tabs.appendChild(tab);
  }
}

// ── 급식 렌더 ─────────────────────────────────────────────
function renderMeal(ymd) {
  const content = document.getElementById('mealContent');
  const meals   = weekMealData[ymd];

  if (!meals?.length) {
    content.innerHTML = `<div class="no-meal">
      <div class="big-emoji">🍽️</div>
      이 날은 급식 정보가 없습니다.
    </div>`;
    return;
  }

  content.innerHTML = meals.map(renderMealCard).join(
    '<hr style="border:none;border-top:1px solid #e2e8f0;margin:24px 0;">'
  );

  // 패널 초기화
  activeVk = null; activePanelId = null;
}

function renderMealCard(m) {
  const typeLabel = { '1': '🌅 조식', '2': '🌞 중식', '3': '🌙 석식' }[m.MMEAL_SC_CODE] || '🍽️ 급식';

  // 메뉴 파싱 (알레르기 번호 제거)
  const items = (m.DDISH_NM || '')
    .split('<br/>')
    .map(s => s.replace(/\s*\(\d[\d.,]*\)/g, '').trim())
    .filter(Boolean);

  const panelId = `${selectedSchool.SD_SCHUL_CODE}_${m.MLSV_YMD}_${m.MMEAL_SC_CODE}`;

  // 메뉴 카드 HTML
  const cardsHtml = items.map((name, i) => {
    const emoji = getFoodEmoji(name);
    const color = CARD_COLORS[i % CARD_COLORS.length];
    const vk = `${panelId}_${i}`;
    const cleanName = name.replace(/'/g, '');
    return `<div class="menu-card ${color}" id="card-${vk}" onclick="selectCard(this,'${vk}','${panelId}','${cleanName}')">
      <span class="food-emoji">${emoji}</span>
      <div class="food-name">${name}</div>
    </div>`;
  }).join('');

  // 영양 정보
  const kcalHtml = m.CAL_INFO
    ? `<div class="kcal-bar">
        <div class="kcal-title">영양 정보</div>
        <div class="kcal-main">🔥 ${m.CAL_INFO}</div>
        ${m.NTR_INFO ? buildNtrChips(m.NTR_INFO) : ''}
       </div>`
    : '';

  const votePanel = `
    <div class="vote-panel hidden" id="panel-${panelId}">
      <div class="vote-panel-name" id="panel-label-${panelId}"></div>
      <div class="vote-panel-btns">
        <button class="vote-emoji-btn" id="vbtn-good-${panelId}" onclick="castVote('good')">😋<span>맛있어요</span><span class="vote-count" id="vcnt-good-${panelId}"></span></button>
        <button class="vote-emoji-btn" id="vbtn-meh-${panelId}"  onclick="castVote('meh')">😐<span>보통이에요</span><span class="vote-count" id="vcnt-meh-${panelId}"></span></button>
        <button class="vote-emoji-btn" id="vbtn-bad-${panelId}"  onclick="castVote('bad')">😞<span>별로예요</span><span class="vote-count" id="vcnt-bad-${panelId}"></span></button>
      </div>
    </div>`;

  return `
    <div class="meal-type-label">${typeLabel}</div>
    <div class="menu-grid">${cardsHtml}</div>
    ${votePanel}
    ${kcalHtml}`;
}

function buildNtrChips(ntrStr) {
  const chips = ntrStr.split('<br/>').map(part => {
    const m = part.match(/^(.+?):\s*([\d.]+)/);
    if (!m) return '';
    return `<span class="ntr-chip"><strong>${m[1].trim()}</strong> ${parseFloat(m[2]).toFixed(1)}</span>`;
  }).filter(Boolean).join('');
  return `<div class="ntr-grid">${chips}</div>`;
}
